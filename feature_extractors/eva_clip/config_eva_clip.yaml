# ===========================================================================
# EVA-CLIP 视觉特征提取配置文件
# 输出格式：[1024, 1408]  （ln_vision 后、CLS 移除、时间均值）
# ===========================================================================

model:
  img_size: 448
  precision: "fp16"       # EVA-CLIP 使用 fp16（与 Emotion-LLaMA 训练一致）
  device: "cuda:0"

vision_preprocess:
  fps: 1.0                # EVA-CLIP 是图像模型，1fps 通常足够
  max_frames: 16          # 最多采样帧数（超长视频保护）
  image_size: 448         # 与 Emotion-LLaMA 训练配置一致

datasets:
  - name: "CA-MER"
    dataset_path: "/root/autodl-tmp/datasets/CA-MER"
    annotation_file: "video-aligned.json"
    video_dir: "video-aligned"
    supported_extensions: [".avi", ".mp4", ".mov", ".mkv", ".webm", ".flv"]

  - name: "EMER"
    # emotion_analysis_data.json 在仓库根目录，视频路径为绝对路径
    dataset_path: "/home/user/Emotion-LLaMA"
    annotation_file: "emotion_analysis_data.json"
    video_dir: "video"    # 绝对路径优先，此字段仅作回退用
    supported_extensions: [".avi", ".mp4", ".mov", ".mkv", ".webm", ".flv"]

feature_saving:
  output_root: "/root/autodl-fs/features"
  # 最终路径: {output_root}/EVA-CLIP/{dataset_name}/{video_id}_features.pt

resume:
  enabled: true
  # {dataset} 占位符会被数据集名称替换
  checkpoint_file: "/root/autodl-tmp/logs/eva_clip_{dataset}_checkpoint.json"
  save_interval: 50

logging:
  level: "INFO"
  output_dir: "/root/autodl-tmp/logs"
